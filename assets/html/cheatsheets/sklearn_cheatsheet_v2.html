<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scikit-learn Cheat Sheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1d24; --paper:#fbfaf8; --line:#e7e3db; --muted:#6b7280;
    --create:#2563eb;  --create-bg:#eff4fe;
    --inspect:#64748b; --inspect-bg:#f1f3f6;
    --select:#d97706;  --select-bg:#fdf6ec;
    --shape:#7c3aed;   --shape-bg:#f5f0fd;
    --clean:#059669;   --clean-bg:#ecf7f2;
    --stats:#0891b2;   --stats-bg:#eafafd;
    --danger:#dc2626;  --danger-bg:#fdf0ef;
    --star:#b45309;
    --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    --sans:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--sans); color:var(--ink); background:var(--paper);
    line-height:1.5; -webkit-font-smoothing:antialiased;
  }

  header{
    border-bottom:2px solid var(--ink);
    padding:2.2rem clamp(1rem,4vw,3rem) 1.6rem;
    max-width:1500px; margin:0 auto;
  }
  .eyebrow{
    font-family:var(--mono); font-size:.72rem; letter-spacing:.18em;
    text-transform:uppercase; color:var(--muted); margin-bottom:.6rem;
  }
  h1{
    font-size:clamp(2rem,5vw,3.2rem); font-weight:700; letter-spacing:-.02em;
    line-height:1; margin-bottom:.7rem;
  }
  h1 .sk{font-family:var(--mono); color:var(--create)}
  .lede{max-width:64ch; color:#3f444f; font-size:1.02rem}
  .lede b{color:var(--ink)}
  .sources{
    font-family:var(--mono); font-size:.7rem; color:var(--muted);
    margin-top:1rem; line-height:1.7;
  }
  .sources b{color:var(--ink); font-weight:500}

  .legend{
    display:flex; flex-wrap:wrap; gap:.5rem .9rem; margin-top:1.2rem;
    font-family:var(--mono); font-size:.74rem;
  }
  .legend span{display:inline-flex; align-items:center; gap:.4rem}
  .dot{width:11px; height:11px; border-radius:3px; display:inline-block}
  .dot.create{background:var(--create)} .dot.inspect{background:var(--inspect)}
  .dot.select{background:var(--select)} .dot.shape{background:var(--shape)}
  .dot.clean{background:var(--clean)} .dot.stats{background:var(--stats)}
  .dot.danger{background:var(--danger)}

  .flow-wrap{ max-width:1500px; margin:0 auto; padding:2rem clamp(1rem,4vw,3rem) .5rem; }
  .flow-title{
    font-family:var(--mono); font-size:.8rem; letter-spacing:.1em;
    text-transform:uppercase; color:var(--muted); margin-bottom:1rem;
  }
  .flow-svg{width:100%; height:auto; max-width:1080px; display:block; margin:0 auto}
  .flow-svg text{font-family:var(--mono)}

  main{
    max-width:1500px; margin:0 auto; padding:1.5rem clamp(1rem,4vw,3rem) 4rem;
    column-gap:1.4rem;
  }
  @media(min-width:760px){ main{column-count:2} }
  @media(min-width:1240px){ main{column-count:3} }

  .card{
    break-inside:avoid; background:#fff; border:1px solid var(--line);
    border-radius:10px; margin-bottom:1.4rem; overflow:hidden;
    box-shadow:0 1px 2px rgba(20,20,30,.03);
  }
  .card-head{
    display:flex; align-items:baseline; gap:.6rem;
    padding:.85rem 1rem .7rem; border-bottom:1px solid var(--line);
  }
  .card-num{
    font-family:var(--mono); font-size:.78rem; font-weight:700;
    color:#fff; background:var(--ink); border-radius:5px;
    padding:.12rem .42rem; letter-spacing:.02em;
  }
  .card-title{font-size:.96rem; font-weight:700; letter-spacing:-.01em}
  .card-sub{font-size:.75rem; color:var(--muted); margin-left:auto; font-family:var(--mono); text-align:right}

  ul.cmds{list-style:none}
  ul.cmds li{
    padding:.5rem 1rem; border-bottom:1px solid #f1eee8;
    border-left:3px solid transparent;
  }
  ul.cmds li:last-child{border-bottom:none}
  ul.cmds li.create{border-left-color:var(--create)}
  ul.cmds li.inspect{border-left-color:var(--inspect)}
  ul.cmds li.select{border-left-color:var(--select)}
  ul.cmds li.shape{border-left-color:var(--shape)}
  ul.cmds li.clean{border-left-color:var(--clean)}
  ul.cmds li.stats{border-left-color:var(--stats)}
  ul.cmds li.danger{border-left-color:var(--danger); background:var(--danger-bg)}
  ul.cmds li.note{border-left-color:var(--line); background:#faf9f6}

  code.cmd{
    font-family:var(--mono); font-size:.79rem; font-weight:500;
    color:var(--ink); display:block; word-break:break-word;
  }
  code.cmd .arg{color:var(--create); font-weight:400}
  code.cmd .flag{color:var(--star)}
  code.cmd .num{color:var(--stats); font-weight:400}
  li.danger code.cmd{color:var(--danger)}
  li.note code.cmd{color:#525761; font-style:italic; font-weight:400}
  .desc{font-size:.78rem; color:#525761; margin-top:.18rem}
  .desc code{font-family:var(--mono); font-size:.95em; background:#f1eee8; padding:.02rem .2rem; border-radius:3px}
  .star{
    color:var(--star); font-size:.7rem; font-weight:700; font-family:var(--mono);
    margin-left:.35rem; letter-spacing:.03em;
  }
  .badge-danger{
    color:var(--danger); font-size:.66rem; font-weight:700; font-family:var(--mono);
    text-transform:uppercase; letter-spacing:.05em; margin-left:.35rem;
  }
  .badge-safe{
    color:var(--clean); font-size:.66rem; font-weight:700; font-family:var(--mono);
    text-transform:uppercase; letter-spacing:.05em; margin-left:.35rem;
  }

  .diagrams{ max-width:1500px; margin:0 auto; padding:1rem clamp(1rem,4vw,3rem) 3rem; }
  .diagrams h2{
    font-size:1.4rem; font-weight:700; letter-spacing:-.01em;
    margin-bottom:.3rem; padding-top:1.5rem; border-top:2px solid var(--ink);
  }
  .diagrams .sub{color:var(--muted); font-size:.9rem; margin-bottom:1.5rem}
  .merge-grid{display:grid; gap:1.2rem; grid-template-columns:1fr}
  @media(min-width:780px){ .merge-grid{grid-template-columns:1fr 1fr} }
  .merge-card{border:1px solid var(--line); border-radius:10px; background:#fff; padding:1rem 1.1rem}
  .merge-card h3{font-size:.95rem; font-family:var(--mono); margin-bottom:.15rem}
  .merge-card p{font-size:.78rem; color:var(--muted); margin-bottom:.7rem}
  .merge-card .bsvg{width:100%; height:auto; display:block}

  .refs{ max-width:1500px; margin:0 auto; padding:1rem clamp(1rem,4vw,3rem) 4rem; }
  .refs h2{
    font-size:1.4rem; font-weight:700; margin-bottom:1rem; padding-top:1.5rem;
    border-top:2px solid var(--ink);
  }
  .refs-inner{
    background:var(--ink); color:#e8e6e1; border-radius:10px;
    padding:1.2rem 1.4rem; font-family:var(--mono); font-size:.82rem;
    display:grid; gap:.55rem; grid-template-columns:1fr;
  }
  @media(min-width:680px){ .refs-inner{grid-template-columns:1fr 1fr} }
  .refs-inner div{display:flex; gap:.7rem; align-items:baseline}
  .refs-inner .k{color:#fbbf24; white-space:nowrap; font-weight:700}
  .refs-inner .v{color:#cbd5e1}

  footer{
    max-width:1500px; margin:0 auto; padding:2rem clamp(1rem,4vw,3rem) 3rem;
    border-top:1px solid var(--line); font-size:.76rem; color:var(--muted);
    font-family:var(--mono); line-height:1.7;
  }
  @media(prefers-reduced-motion:reduce){ html{scroll-behavior:auto} }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Quick Reference &middot; machine learning in Python</div>
  <h1><span class="sk">scikit-learn - TODO</span> cheat sheet</h1>
</header>

</body>
</html>
